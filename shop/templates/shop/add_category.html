{% extends 'shop/base.html' %}
{% block content %}

<style>

/* MOBILE IMPROVEMENTS ONLY */

@media (max-width:768px){

.container{
padding-left:15px;
padding-right:15px;
}

/* stack category row */

.category-item{
flex-direction:column;
align-items:flex-start !important;
gap:10px;
}

/* full width delete button */

.category-item .btn{
width:100%;
}

}

</style>

<div class="container mt-5">

<h2>Add Category</h2>

<form method="post">

{% csrf_token %}

<input type="text"
name="name"
class="form-control mb-3"
placeholder="Category name"
required>

<button type="submit"
class="btn btn-success">
Add Category </button>

</form>

<hr>

<h4>Existing Categories</h4>

<ul class="list-group">

{% for category in categories %}

<li class="list-group-item d-flex justify-content-between category-item">

<span>{{ category.name }}</span>

<a href="{% url 'delete_category' category.id %}"
class="btn btn-sm btn-danger">
Delete </a>

</li>

{% empty %}

<li class="list-group-item text-danger">
No categories found
</li>

{% endfor %}

</ul>

</div>

{% endblock %}
