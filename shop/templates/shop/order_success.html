{% extends 'shop/base.html' %}
{% load static %}
{% block content %}

<style>

/* ===== PAGE BACKGROUND ===== */

.success-wrapper{
min-height:100vh;
background:#f2f2f2;
display:flex;
align-items:center;
justify-content:center;
padding:100px 20px;
}

/* ===== GLASS CARD ===== */

.success-card{
background:#111;
border-radius:35px;
padding:70px 60px;
text-align:center;
box-shadow:0 40px 80px rgba(0,0,0,0.3);
color:white;
max-width:650px;
width:100%;
position:relative;
overflow:hidden;
animation:fadeInUp 0.8s ease;
}

/* ===== ANIMATION ===== */

@keyframes fadeInUp{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

/* ===== SUCCESS ICON ===== */

.success-circle{
width:120px;
height:120px;
border-radius:50%;
background:linear-gradient(45deg,#ff6b00,#ff8c42);
display:flex;
align-items:center;
justify-content:center;
margin:0 auto 30px;
font-size:55px;
animation:pop 0.6s ease;
}

@keyframes pop{
0%{transform:scale(0);}
80%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* ===== TEXT ===== */

.success-title{
font-size:32px;
font-weight:700;
margin-bottom:15px;
}

.success-text{
font-size:16px;
color:#ccc;
margin-bottom:25px;
}

/* ===== ORDER ID ===== */

.order-id{
background:#222;
padding:12px 20px;
border-radius:30px;
display:inline-block;
margin-bottom:30px;
font-size:14px;
letter-spacing:1px;
}

/* ===== BUTTONS ===== */

.success-actions{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.success-btn{
height:55px;
border-radius:50px;
padding:0 35px;
font-weight:600;
border:none;
transition:0.3s ease;
display:inline-flex;
align-items:center;
justify-content:center;
line-height:1;
}

.primary-btn{
background:linear-gradient(45deg,#ff6b00,#ff8c42);
color:white;
}

.primary-btn:hover{
transform:translateY(-3px);
box-shadow:0 20px 40px rgba(255,107,0,0.5);
}

.secondary-btn{
background:#333;
color:white;
}

.secondary-btn:hover{
background:#444;
}

/* ===== CONFETTI ===== */

.confetti{
position:absolute;
width:10px;
height:10px;
background:#ff6b00;
animation:fall 3s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px) rotate(0deg);}
100%{transform:translateY(600px) rotate(360deg);}
}

/* ===== MOBILE RESPONSIVE FIX ===== */

@media (max-width:768px){

.success-wrapper{
padding:70px 15px;
}

.success-card{
padding:45px 30px;
}

.success-circle{
width:90px;
height:90px;
font-size:40px;
}

.success-title{
font-size:26px;
}

.success-text{
font-size:14px;
}

.success-btn{
width:100%;
height:50px;
}

}

</style>

<div class="success-wrapper">

<div class="success-card">

<div class="success-circle">✔</div>

<div class="success-title">
Order Placed Successfully!
</div>

<div class="success-text">
Thank you for ordering from <strong>Wrap Station</strong>.<br>
Your delicious meal is now being prepared 🚀
</div>

<div class="order-id">
Order ID: #{{ request.user.orders.last.id }}
</div>

<div class="success-actions">

<a href="{% url 'my_orders' %}" class="btn success-btn primary-btn">
Track Order
</a>

<a href="{% url 'product_list' %}" class="btn success-btn secondary-btn">
Continue Shopping
</a>

</div>

</div>

</div>

<script>

/* SIMPLE CONFETTI EFFECT */

for(let i=0;i<25;i++){

let conf=document.createElement("div");

conf.classList.add("confetti");

conf.style.left=Math.random()*100+"%";

conf.style.animationDelay=Math.random()*3+"s";

conf.style.background=["#ff6b00","#ff8c42","#ffd700","#00ffcc"][Math.floor(Math.random()*4)];

document.querySelector(".success-card").appendChild(conf);

}

</script>

{% endblock %}
