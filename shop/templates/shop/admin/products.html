{% extends 'shop/base.html' %}
{% block content %}

<h2>Manage Products</h2>

<a href="{% url 'admin_add_product' %}" class="btn btn-success mb-3">Add Product</a>

<table class="table table-bordered">
<tr>
<th>Name</th>
<th>Price</th>
<th>Stock</th>
<th>Action</th>
</tr>

{% for product in products %}
<tr>
<td>{{ product.name }}</td>
<td>{{ product.price }}</td>
<td>{{ product.stock }}</td>
<td>
<a href="{% url 'admin_delete_product' product.id %}" class="btn btn-danger btn-sm">Delete</a>
</td>
</tr>
{% endfor %}
</table>

{% endblock %}
