{% extends 'shop/base.html' %}
{% block content %}

<h2>Add Product</h2>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<select name="category" class="form-control mb-2">
{% for c in categories %}
<option value="{{ c.id }}">{{ c.name }}</option>
{% endfor %}
</select>

<input type="text" name="name" placeholder="Product Name" class="form-control mb-2">
<textarea name="description" placeholder="Description" class="form-control mb-2"></textarea>
<input type="number" step="0.01" name="price" placeholder="Price" class="form-control mb-2">
<input type="number" name="stock" placeholder="Stock" class="form-control mb-2">
<input type="file" name="image" class="form-control mb-2">

<button type="submit" class="btn btn-primary">Save</button>
</form>

{% endblock %}
